# Zephyrus GU605MY — Low-latency PipeWire profile for gaming
# Place in /usr/share/pipewire/pipewire.conf.d/ or ~/.config/pipewire/pipewire.conf.d/
# Restarts automatically when PipeWire reloads

context.properties = {
    # Lower default buffer size for reduced audio latency
    default.clock.rate = 48000
    default.clock.quantum = 512
    default.clock.min-quantum = 32
    default.clock.max-quantum = 2048
}

context.modules = [
    # Load RTKit for realtime scheduling
    { name = libpipewire-module-rtkit
        args = {
            # Higher realtime priority for audio threads
            nice.level = -11
            rt.prio = 88
            rt.time.soft = 200000
            rt.time.hard = 200000
        }
    }
]
