    ‚ēĎ  Optimized ‚ÄĘ Customized ‚ÄĘ Gaming Ready                        ‚ēĎ
    ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ
    EOF
    
  # Zephyrus OS GNOME defaults
  - |
    #!/bin/bash
    mkdir -p /etc/dconf/db/local.d
    
    cat > /etc/dconf/db/local.d/00-zephyrus-os-branding << 'EOF'
    [org/gnome/shell/extensions/user-theme]
    name='Zephyrus-Crimson'
    
    [org/gnome/desktop/interface]
    gtk-theme='Zephyrus-Crimson'
    icon-theme='Zephyrus-Icons'
    cursor-theme='Zephyrus-Cursor'
    font-name='Roboto 11'
    monospace-font-name='JetBrains Mono 10'
    
    [org/gnome/shell]
    enabled-extensions=['zephyrus-globalmenu@solarious']
    favorite-apps=['zephyrus-control-center.desktop', 'firefox.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Console.desktop']
    
    [org/gnome/desktop/background]
    picture-uri='file:///usr/share/backgrounds/zephyrus/zephyrus-default.jpg'
    picture-uri-dark='file:///usr/share/backgrounds/zephyrus/zephyrus-dark.jpg'
    
    [org/gnome/desktop/screensaver]
    lock-enabled=false
    
    [org/gnome/settings-daemon/plugins/power]
    sleep-inactive-ac-timeout=0
    sleep-inactive-battery-timeout=0
    EOF
    
    # Lock Zephyrus theme
    mkdir -p /etc/dconf/db/local.d/locks
    cat > /etc/dconf/db/local.d/locks/zephyrus-branding << 'EOF'
    /org/gnome/shell/extensions/user-theme/name
    EOF
    
    dconf update
    
  # Zephyrus OS ASUS configuration
  - |
    #!/bin/bash
    mkdir -p /etc/asusd
    
    cat > /etc/asusd/asusd.conf << 'EOF'
    {
      "boot_sound": false,
      "change_brightness": true,
      "charge_control_end_threshold": 80,
      "charge_control_start_threshold": 60,
      "disable_nvidia_powerd_on_battery": true,
      "mini_led_mode": false,
      "panel_od": true,
      "throttle_policy": "Performance",
      "zephyrus_os": true,
      "zephyrus_theme": "crimson"
    }
    EOF
    
  # Create Zephyrus OS directories
  - |
    #!/bin/bash
    mkdir -p /usr/share/zephyrus-os
    mkdir -p /etc/zephyrus-os
    mkdir -p /var/lib/zephyrus-os
    
    # Create version marker
    echo "ZEPHYRUS_OS_41_ROG_CRIMSON" > /usr/share/zephyrus-os/version

# Zephyrus OS initramfs configuration
initramfs-args:
  - --add=asus-wmi
  - --add=asus-nb-wmi
  - --add=hid-asus
  - --add=nvidia-drm
  - --add=amdgpu
  - --add=i915

# Zephyrus OS recommends
recommends:
  - zephyrus-firstboot
  - zephyrus-welcome

# Optimal for ROG laptops
tmp-is-dir: true

# Boot location
boot-location: new

# SELinux
selinux: true
