# Zephyrus OS - OSTree Treefile Manifest
# This defines your custom distro image

ref: fedora/41/x86_64/zephyrus-os

include: fedora-41-base.yaml  # Base Fedora Silverblue/Bazzite

packages:
  # Core GNOME (your custom build will override these)
  - gnome-shell
  - gnome-session
  - gnome-settings-daemon
  
  # ROG/Zephyrus Hardware Support
  - asusctl
  - supergfxctl
  - linux-g14  # ROG-optimized kernel (if available)
  
  # Your Custom Software (adjust paths as needed)
  # - /path/to/your/rog-control-center.rpm
  # - /path/to/your/keyboard-backlight-daemon.rpm
  
  # System utilities
  - just
  - distrobox
  - toolbox
  
  # Gaming/Performance
  - gamemode
  - gamescope
  - mangohud
  
  # ROG Theme dependencies
  - gnome-tweaks
  - gnome-extensions-app
  - sassc  # For theme compilation

# Replace stock GNOME Shell with your custom build
override-replace:
  # Your custom GNOME Shell RPM will go here
  # - gnome-shell-49.4-1.zephyrus.fc41.x86_64

# Add your custom repos
repos:
  - fedora
  - fedora-updates
  - rpmfusion-free
  - rpmfusion-nonfree
  - lukenukem-asus-linux  # For asusctl/supergfxctl

# Post-processing scripts
postprocess:
  # Set up Zephyrus OS branding
  - |
    #!/bin/bash
    echo "ZEPHYRUS OS" > /etc/os-release.d/ZEPHYRUS_OS
    
  # Configure GNOME defaults for ROG theme
  - |
    #!/bin/bash
    mkdir -p /etc/dconf/db/local.d
    cat > /etc/dconf/db/local.d/01-zephyrus << 'EOF'
    [org/gnome/shell/extensions/user-theme]
    name="ROG-Crimson"
    
    [org/gnome/desktop/interface]
    gtk-theme="ROG-Crimson"
    icon-theme="ROG-Icons"
    cursor-theme="ROG-Cursor"
    
    [org/gnome/shell]
    enabled-extensions=['zephyrus-globalmenu@solarious']
    favorite-apps=['firefox.desktop', 'org.gnome.Nautilus.desktop', 'org.gnome.Console.desktop']
    EOF
    
    dconf update

# Remove unwanted packages
exclude-packages:
  - gnome-classic-session  # We use our own session
  - gnome-shell-extension-apps-menu  # We have our own menu
  
# Custom initramfs args (for ROG hardware support)
initramfs-args:
  - --add=asus-wmi
  - --add=nvidia-drm  # If you have NVIDIA
  - --add=amdgpu      # If you have AMD
