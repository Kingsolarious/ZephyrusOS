# Zephyrus Crimson OS - System Configuration
# This file contains system-wide defaults for Zephyrus Crimson

[branding]
name=Zephyrus Crimson OS
version=1.0.0
codename=Crimson
vendor=Solarious

[theme]
gtk_theme=Zephyrus-Crimson
icon_theme=Zephyrus-Crimson
shell_theme=Zephyrus-Crimson
cursor_theme=Adwaita

[desktop]
background=/usr/share/backgrounds/zephyrus-crimson/default.jpg
accent_color=#ff0033

[gdm]
enabled=true
logo=/usr/share/zephyrus-crimson/gdm/rog-eye.png
background=/usr/share/zephyrus-crimson/gdm/background.jpg

[plymouth]
enabled=true
theme=zephyrus-crimson

[extensions]
enabled=zephyrus-globalmenu@solarious
