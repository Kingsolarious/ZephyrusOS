# Zephyrus GU605MY — Gaming Performance Tuning
# Reduces latency and stutter during gaming workloads

# VM: Flush dirty pages more aggressively to reduce stutter
vm.dirty_ratio = 5
vm.dirty_background_ratio = 3
vm.dirty_expire_centisecs = 1500
vm.dirty_writeback_centisecs = 250

# Network: Reduce bufferbloat, improve responsiveness
net.core.netdev_max_backlog = 65536
net.ipv4.tcp_fastopen = 3
net.core.somaxconn = 8192

# Scheduler: Slightly more aggressive task scheduling
kernel.sched_latency_ns = 1000000
kernel.sched_min_granularity_ns = 100000
kernel.sched_wakeup_granularity_ns = 50000
