# Zephyrus GU605MY Audio Configuration
# Hardware: Realtek ALC285 + Cirrus Logic CS35L56 smart amp
# These settings optimize HDA codec probing and DSP firmware loading.

# Ensure HDA codec is properly probed for ALC285
options snd-hda-intel model=alc285-laptop probe_mask=1 power_save=0 power_save_controller=N

# Disable power management on the audio controller to prevent dropouts
options snd-hda-intel pm_blacklist=Y

# SOF firmware options for Intel Meteor Lake (Core Ultra 9 185H)
options snd_sof_intel_hda_common hda_model=alc285
options snd_sof sof_debug=0

# CS35L56 smart amp driver options (if bound via HDA side-codec or I2C)
options snd-hda-scodec-cs35l41 dsp_firmware=CS35L56_Rev3.11.16.wmfw
