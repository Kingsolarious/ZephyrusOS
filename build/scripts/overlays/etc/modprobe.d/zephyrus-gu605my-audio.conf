# Zephyrus GU605MY Audio Configuration
# Realtek ALC285 + Cirrus Logic CS35L56 smart amp

# Ensure HDA codec is properly probed for ALC285
# Removed probe_mask=1 — can cause digital mic noise on some ALC285 variants
options snd-hda-intel model=alc285-laptop power_save=0 power_save_controller=0
options snd-hda-intel pm_blacklist=1

# SOF firmware options for Intel Meteor Lake
options snd_sof_intel_hda_common hda_model=alc285
options snd_sof sof_debug=0
