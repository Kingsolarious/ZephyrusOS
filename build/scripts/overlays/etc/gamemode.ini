; GameMode configuration for ASUS ROG Zephyrus GU605MY
; Optimized for Intel Core Ultra 9 185H + RTX 4090

[general]
start=
end=

; Keep game at normal nice level (don't renice system processes)
renice=0

; Soft realtime gives the game better scheduling without hurting input
softrealtime=auto

; Don't inhibit screensaver manually, let the game do it
inhibit_screensaver=0

[gpu]
apply_gpu_optimisations=accept-responsibility
gpu_device=0

; NVIDIA PowerMizer: 1 = Prefer Maximum Performance
; This keeps GPU clocks high, reducing stutter from clock ramp-up
nv_powermizer_mode=1

; Optional: GPU overclock offsets
; NOTE: VBIOS may reject these on laptop GPUs. Test carefully.
; nv_core_clock_mhz_offset=50
; nv_mem_clock_mhz_offset=100

[cpu]
; Force performance governor while gamemode is active
governor=performance

; Pin game to physical cores only (avoid hyperthreaded logical cores)
; On Core Ultra 9 185H: cores 0-5 are P-cores (0-11 logical), 6-21 are E-cores
; Pinning to P-cores only can reduce latency for competitive gaming
; pin_cores=yes

; Disable CPU governor switching in gamemode if our profile sync handles it
; (Profile sync already sets governor, so this is redundant but safe)

[filter]
; Whitelist input-related processes so gamemode never touches them
whitelist=ckb-next
whitelist=ckb-next-daemon

; Whitelist PipeWire and audio threads
whitelist=pipewire
whitelist=wireplumber
